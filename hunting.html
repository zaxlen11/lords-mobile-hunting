<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle" data-page-key="monster_hunting"></title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .monster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .monster-btn {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--light-blue) 100%);
            color: white;
            border: none;
            padding: 16px 12px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .monster-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
        }

        .monster-btn:active {
            transform: translateY(0);
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--light-blue) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.2em;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }

        .modal-image {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 400px) {
            .monster-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .monster-btn {
                padding: 14px 8px;
                font-size: 0.85em;
            }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6GVRLX79L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-C6GVRLX79L');
    </script>
</head>
<body>

<header>
    <div class="language-switcher">
        <button class="lang-switcher-btn" id="langSwitcherBtn" onclick="document.getElementById('languageDropdown').classList.toggle('show')"><i class="fas fa-globe"></i> English</button>
        <div class="language-dropdown" id="languageDropdown">
            <a href="#" class="lang-option" data-lang="en" onclick="setLanguage('en'); document.getElementById('languageDropdown').classList.remove('show');">English</a>
            <a href="#" class="lang-option" data-lang="es" onclick="setLanguage('es'); document.getElementById('languageDropdown').classList.remove('show');">Español</a>
            <a href="#" class="lang-option" data-lang="ja" onclick="setLanguage('ja'); document.getElementById('languageDropdown').classList.remove('show');">日本語</a>
            <a href="#" class="lang-option" data-lang="ar" onclick="setLanguage('ar'); document.getElementById('languageDropdown').classList.remove('show');">العربية</a>
            <a href="#" class="lang-option" data-lang="vi" onclick="setLanguage('vi'); document.getElementById('languageDropdown').classList.remove('show');">Tiếng Việt</a>
            <a href="#" class="lang-option" data-lang="zh" onclick="setLanguage('zh'); document.getElementById('languageDropdown').classList.remove('show');">中文</a>
        </div>
    </div>
    <div class="logo" data-translate-key="app_title">Lords Mobile Hub</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <nav class="nav-links" id="navLinks">
        <a href="index.html" data-translate-key="home">Home</a>
        <a href="calculator.html" data-translate-key="speedup_calculator">Speedup Calculator</a>
        <a href="hunting.html" data-translate-key="monster_hunting">Monster Hunting</a>
        <a href="training.html" data-translate-key="training_calculator">Training Calculator</a>
        <a href="composition.html">Troop Composition</a>
        <a href="migration.html">Migration Guide</a>
    </nav>
</header>

<div class="container">
    <div class="section-title" data-translate-key="select_monster">Select a monster to see its lineup:</div>
    
    <div class="monster-grid" id="monsterGrid">
        <!-- Buttons will be generated by JavaScript -->
    </div>

    <footer>
        <p data-translate-key="footer_text">&copy; 2026 Lords Mobile Hub | jash0077</p>
    </footer>
</div>

<!-- Modal for showing monster image -->
<div class="modal-overlay" id="monsterModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitle">Monster Name</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <img id="modalImage" class="modal-image" src="" alt="">
    </div>
</div>

<script>
    const monsters = [
        { name: "Bon Appeti", image: "images/photo_AQADZA9rG92AgVR-.jpg" },
        { name: "Queen Bee", image: "images/photo_AQADZQ9rG92AgVR-.jpg" },
        { name: "Mega Maggot", image: "images/photo_AQADZg9rG92AgVR-.jpg" },
        { name: "Hootclaw", image: "images/photo_AQADZw9rG92AgVR-.jpg" },
        { name: "Tidal Titan", image: "images/photo_AQADaA9rG92AgVR-.jpg" },
        { name: "Mecha Trojan", image: "images/photo_AQADaQ9rG92AgVR-.jpg" },
        { name: "Grim Reaper", image: "images/photo_AQADag9rG92AgVR-.jpg" },
        { name: "Blackwing", image: "images/photo_AQADaw9rG92AgVR-.jpg" },
        { name: "Snow Beast", image: "images/photo_AQADbA9rG92AgVR-.jpg" },
        { name: "Frostwing", image: "images/photo_AQADbQ9rG92AgVR-.jpg" },
        { name: "Voodoo Shaman", image: "images/photo_AQADbg9rG92AgVR-.jpg" },
        { name: "Terrorthorn", image: "images/photo_AQADbw9rG92AgVR-.jpg" },
        { name: "Serpent Gladiator", image: "images/photo_AQADcA9rG92AgVR-.jpg" },
        { name: "Saberfang", image: "images/photo_AQADcQ9rG92AgVR-.jpg" },
        { name: "Noceros", image: "images/photo_AQADcg9rG92AgVR-.jpg" },
        { name: "Jade Wyrm", image: "images/photo_AQADcw9rG92AgVR-.jpg" },
        { name: "Hell Drider", image: "images/photo_AQADdA9rG92AgVR-.jpg" },
        { name: "Hardrox", image: "images/photo_AQADdQ9rG92AgVR-.jpg" },
        { name: "Gryphon", image: "images/photo_AQADdg9rG92AgVR-.jpg" },
        { name: "Gawrilla", image: "images/photo_AQADdw9rG92AgVR-.jpg" },
        { name: "Gargantua", image: "images/photo_AQADeA9rG92AgVR-.jpg" },
        { name: "Cottageroar", image: "images/photo_AQADeQ9rG92AgVR-.jpg" },
        { name: "Arctic Flipper", image: "images/photo_AQADeg9rG92AgVR-.jpg" },
        { name: "Necrosis", image: "images/photo_AQADMQ9rG9P2gFV9.jpg" }
    ];

    // Generate monster buttons
    const grid = document.getElementById('monsterGrid');
    monsters.forEach(function(monster) {
        const btn = document.createElement('button');
        btn.className = 'monster-btn';
        btn.textContent = monster.name;
        btn.onclick = function() { showMonster(monster.name, monster.image); };
        grid.appendChild(btn);
    });

    function showMonster(name, imageSrc) {
        document.getElementById('modalTitle').textContent = name;
        document.getElementById('modalImage').src = imageSrc;
        document.getElementById('modalImage').alt = name;
        document.getElementById('monsterModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
        if (event && event.target !== document.getElementById('monsterModal') && !event.target.classList.contains('modal-close')) {
            return;
        }
        document.getElementById('monsterModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.getElementById('monsterModal').classList.remove('active');
            document.body.style.overflow = '';
        }
    });

    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('active');
    }
</script>
<script src="translations.js"></script>

</body>
</html>
